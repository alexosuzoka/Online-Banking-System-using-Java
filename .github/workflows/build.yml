# This workflow will build a Java project with Ant
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-ant

name: Java CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    environment: My_DockerHub

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
    - name: Remove previous archive
      run: rm -rf Online-Banking-System-using-Java/target/*.war  # Removes preexisting war files

    - name: Docker Login
  # You may pin to the exact commit or the version.
  # uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
      id: docker_login
      uses: docker/login-action@v4.4.0
      with:
    # Server address of Docker registry. If not set then will default to Docker Hub
       registry: docker.io # optional
    # Username used to log against the Docker registry
       username: ${{ secrets.USERNAME}} # optional
    # Password or personal access token used to log against the Docker registry
       password: ${{ secrets.ACCESS_TOKEN}} # optional
       
       logout: true # optional, default is true

    - name: Tag/build/save image for Docker Hub
      if: steps.docker_login.conclusion == success()
      run: |
       docker build -t ${{ secrets.USERNAME }}/online-banking-system:latest Online-Banking-System-using-Java/
       docker push ${{ secrets.USERNAME }}/online-banking-system:latest
       docker save -o Online-Banking-System-using-Java/target/obs.tar ${{ secrets.USERNAME }}/online-banking-system:latest
      
   

    
      
